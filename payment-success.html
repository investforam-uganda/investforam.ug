<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Foram Invest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
            margin: 1rem 0;
        }
        .btn {
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .countdown {
            color: #64748b;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p>Your deposit has been processed successfully</p>
        <div class="amount" id="amount">UGX 0</div>
        <p>Funds have been added to your balance</p>
        <a href="dashboard.html" class="btn">Go to Dashboard</a>
        <div class="countdown" id="countdown">Redirecting in 5 seconds...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount');
        if (amount) {
            document.getElementById('amount').innerHTML = `UGX ${parseInt(amount).toLocaleString()}`;
        }
        
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            seconds--;
            countdownEl.innerHTML = `Redirecting in ${seconds} seconds...`;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'dashboard.html';
            }
        }, 1000);
    </script>
</body>
</html>
