<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Foram Invest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c4a 0%, #2c5f8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-logo {
            font-size: 1.3rem;
            font-weight: 800;
            text-decoration: none;
            color: #1e293b;
        }
        .auth-header h2 {
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #4a5568;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0.8rem;
        }
        .btn-primary {
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        .auth-footer a {
            color: #2c5f8a;
            text-decoration: none;
        }
        .error-message, .success-message {
            padding: 0.6rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .error-message { background: #fee2e2; color: #dc2626; }
        .success-message { background: #dcfce7; color: #16a34a; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-overlay.active { display: flex; }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Password Strength Styles */
        .password-strength-container {
            margin-top: 0.3rem;
        }
        .password-strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .strength-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }
        .password-strength-text {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .strength-label {
            font-weight: 500;
        }
        .strength-requirements {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .req-item {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.65rem;
        }
        .req-item.valid {
            color: #10b981;
        }
        .req-item.invalid {
            color: #ef4444;
        }
        .check-icon {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">⚡ FORAM INVEST</a>
                <h2>Create Account</h2>
                <p>Start your investment journey</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password * (min 6 chars)</label>
                    <input type="password" id="password" required placeholder="••••••">
                </div>
                
                <!-- Password Strength Indicator -->
                <div class="password-strength-container" id="passwordStrength">
                    <div class="password-strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="password-strength-text">
                        <span class="strength-label" id="strengthLabel">Weak</span>
                        <span id="strengthPercent">0%</span>
                    </div>
                    <div class="strength-requirements" id="strengthRequirements">
                        <div class="req-item" id="reqLength">
                            <span class="check-icon">✗</span> <span>At least 6 characters</span>
                        </div>
                        <div class="req-item" id="reqLower">
                            <span class="check-icon">✗</span> <span>Lowercase letter</span>
                        </div>
                        <div class="req-item" id="reqUpper">
                            <span class="check-icon">✗</span> <span>Uppercase letter</span>
                        </div>
                        <div class="req-item" id="reqNumber">
                            <span class="check-icon">✗</span> <span>Number</span>
                        </div>
                        <div class="req-item" id="reqSpecial">
                            <span class="check-icon">✗</span> <span>Special character</span>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Country Code</label>
                        <select id="countryCode">
                            <option value="+256">+256 (Uganda)</option>
                            <option value="+1">+1 (USA)</option>
                            <option value="+44">+44 (UK)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="740327473">
                    </div>
                </div>
                <div class="form-group">
                    <label>Referral Code (optional)</label>
                    <input type="text" id="referralCode" placeholder="Enter referral code">
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="termsCheckbox" required> I agree to the Terms of Service
                    </label>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <div id="signupError" class="error-message" style="display:none;"></div>
                <div id="signupSuccess" class="success-message" style="display:none;"></div>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        // Password Strength Checker
        function checkPasswordStrength(password) {
            let strength = 0;
            let requirements = {
                length: password.length >= 6,
                lower: /[a-z]/.test(password),
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };
            
            // Calculate strength score
            if (requirements.length) strength += 1;
            if (requirements.lower) strength += 1;
            if (requirements.upper) strength += 1;
            if (requirements.number) strength += 1;
            if (requirements.special) strength += 1;
            
            // Get strength label and color
            let strengthData = {
                score: strength,
                percent: (strength / 5) * 100,
                label: '',
                color: '',
                description: ''
            };
            
            switch(strength) {
                case 0:
                case 1:
                    strengthData.label = 'Very Weak';
                    strengthData.color = '#ef4444';
                    strengthData.description = 'Too weak - use longer password';
                    break;
                case 2:
                    strengthData.label = 'Weak';
                    strengthData.color = '#f59e0b';
                    strengthData.description = 'Weak - add more variety';
                    break;
                case 3:
                    strengthData.label = 'Fair';
                    strengthData.color = '#fbbf24';
                    strengthData.description = 'Fair - could be stronger';
                    break;
                case 4:
                    strengthData.label = 'Strong';
                    strengthData.color = '#10b981';
                    strengthData.description = 'Strong password!';
                    break;
                case 5:
                    strengthData.label = 'Very Strong';
                    strengthData.color = '#059669';
                    strengthData.description = 'Excellent password!';
                    break;
            }
            
            // Update UI
            document.getElementById('strengthFill').style.width = strengthData.percent + '%';
            document.getElementById('strengthFill').style.backgroundColor = strengthData.color;
            document.getElementById('strengthLabel').textContent = strengthData.label;
            document.getElementById('strengthPercent').textContent = Math.round(strengthData.percent) + '%';
            document.getElementById('strengthLabel').style.color = strengthData.color;
            
            // Update requirements checklist
            updateRequirement('reqLength', requirements.length, '✓ At least 6 characters', '✗ At least 6 characters');
            updateRequirement('reqLower', requirements.lower, '✓ Contains lowercase', '✗ Add lowercase letter');
            updateRequirement('reqUpper', requirements.upper, '✓ Contains uppercase', '✗ Add uppercase letter');
            updateRequirement('reqNumber', requirements.number, '✓ Contains number', '✗ Add a number');
            updateRequirement('reqSpecial', requirements.special, '✓ Contains special char', '✗ Add special character (!@#$% etc)');
            
            return strengthData;
        }

        function updateRequirement(elementId, isValid, validText, invalidText) {
            const element = document.getElementById(elementId);
            if (isValid) {
                element.classList.add('valid');
                element.classList.remove('invalid');
                element.innerHTML = `<span class="check-icon">✓</span> <span>${validText}</span>`;
            } else {
                element.classList.add('invalid');
                element.classList.remove('valid');
                element.innerHTML = `<span class="check-icon">✗</span> <span>${invalidText}</span>`;
            }
        }

        // Add event listener to password input
        const passwordInput = document.getElementById('password');
        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                checkPasswordStrength(this.value);
            });
            
            // Initial check
            checkPasswordStrength('');
        }

        // Form submission
        const form = document.getElementById('signupForm');
        const errorDiv = document.getElementById('signupError');
        const successDiv = document.getElementById('signupSuccess');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function showLoading(show) {
            if (show) loadingOverlay.classList.add('active');
            else loadingOverlay.classList.remove('active');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsAccepted = document.getElementById('termsCheckbox').checked;
            
            // Password strength check
            const strength = checkPasswordStrength(password);
            
            if (!fullName || !email || !password) {
                errorDiv.textContent = 'Please fill all required fields';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            if (strength.score < 2) {
                errorDiv.textContent = 'Please choose a stronger password (at least 6 characters with mix of letters and numbers)';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            if (!termsAccepted) {
                errorDiv.textContent = 'Please accept the Terms of Service';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            
            // Here you would normally submit to Firebase
            // For demo purposes, show success
            successDiv.textContent = 'Account created successfully!';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
