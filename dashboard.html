<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dashboard - Foram Invest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0B1120 0%, #111827 100%);
      min-height: 100vh;
      color: #f1f5f9;
    }

    /* Animated background */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 { width: 40vw; height: 40vw; background: #10b981; top: -10%; left: -10%; animation: float 18s infinite alternate; }
    .orb-2 { width: 35vw; height: 35vw; background: #059669; bottom: -15%; right: -5%; animation: float 22s infinite alternate-reverse; }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      z-index: 100;
    }
    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #059669);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-links a {
      text-decoration: none;
      color: #94a3b8;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #10b981;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #10b981;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      color: #10b981;
      cursor: pointer;
    }

    /* Main Content */
    .main-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 6rem 2rem 2rem;
      position: relative;
      z-index: 10;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-5px); border-color: rgba(16,185,129,0.3); }
    .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #10b981; }
    .stat-label { font-size: 0.8rem; color: #94a3b8; }

    /* Cards */
    .card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn-deposit, .btn-withdraw, .btn-invest {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-deposit { background: #10b981; color: white; }
    .btn-deposit:hover { background: #059669; transform: translateY(-2px); }
    .btn-withdraw { background: #ef4444; color: white; }
    .btn-withdraw:hover { background: #dc2626; transform: translateY(-2px); }
    .btn-invest { background: #f59e0b; color: white; }
    .btn-invest:hover { background: #d97706; transform: translateY(-2px); }

    /* Referral Box */
    .referral-box {
      background: rgba(16,185,129,0.1);
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .referral-code {
      font-family: monospace;
      font-size: 1.2rem;
      background: #1e293b;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      letter-spacing: 1px;
    }

    /* Transaction List */
    .transaction-item {
      background: rgba(15, 23, 42, 0.5);
      padding: 0.8rem;
      border-radius: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid #10b981;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .main-content { padding: 5rem 1rem 1rem; }
      .nav-container { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">⚡ FORAM INVEST</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="support.html">Support</a>
      <a href="contact.html">Contact</a>
      <button id="logoutBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
</nav>

<div class="main-content">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="balance">UGX 0</div><div class="stat-label">Total Balance</div></div>
    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value" id="returns">UGX 0</div><div class="stat-label">Total Returns</div></div>
    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value" id="invested">UGX 0</div><div class="stat-label">Total Invested</div></div>
    <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value" id="plan">None</div><div class="stat-label">Active Plan</div></div>
  </div>

  <div class="card">
    <h3><i class="fas fa-bolt"></i> Quick Actions</h3>
    <div class="button-group">
      <button class="btn-deposit" id="depositBtn"><i class="fas fa-plus-circle"></i> Deposit</button>
      <button class="btn-withdraw" id="withdrawBtn"><i class="fas fa-minus-circle"></i> Withdraw</button>
      <button class="btn-invest" id="investBtn"><i class="fas fa-chart-line"></i> Invest Now</button>
    </div>
  </div>

  <div class="card">
    <h3><i class="fas fa-gift"></i> Refer & Earn</h3>
    <p style="margin-bottom: 1rem;">Share your code and earn UGX 5,000 per referral!</p>
    <div class="referral-box">
      <span class="referral-code" id="referralCode">LOADING...</span>
      <button class="btn-outline" id="copyCodeBtn"><i class="fas fa-copy"></i> Copy Code</button>
    </div>
    <div style="display: flex; gap: 2rem; margin-top: 1rem;">
      <span><i class="fas fa-users"></i> Referrals: <strong id="referralCount">0</strong></span>
      <span><i class="fas fa-coins"></i> Bonus: <strong id="referralBonus">UGX 0</strong></span>
    </div>
  </div>

  <div class="card">
    <h3><i class="fas fa-history"></i> Transaction History</h3>
    <div id="transactionHistory" style="max-height: 300px; overflow-y: auto;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCX-ag3dli4j1DyP4nJKiO58yOEyQy-_5c",
    authDomain: "invest-foram-platform.firebaseapp.com",
    projectId: "invest-foram-platform",
    storageBucket: "invest-foram-platform.firebasestorage.app",
    messagingSenderId: "284475751069",
    appId: "1:284475751069:web:008f29e8696f483c19b274"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function formatCurrency(amount) {
    return `UGX ${(amount || 0).toLocaleString()}`;
  }

  async function loadDashboard(user) {
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) {
      const data = userSnap.data();
      document.getElementById('balance').innerHTML = formatCurrency(data.totalBalance || 0);
      document.getElementById('returns').innerHTML = formatCurrency(data.totalReturns || 0);
      document.getElementById('invested').innerHTML = formatCurrency(data.totalInvested || 0);
      document.getElementById('plan').innerHTML = data.activePlan || 'None';
      document.getElementById('referralCode').innerHTML = data.referralCode || 'N/A';
      document.getElementById('referralCount').innerHTML = data.referrals || 0;
      document.getElementById('referralBonus').innerHTML = formatCurrency(data.referralBonus || 0);
      
      // Load transactions
      const transRef = collection(db, "users", user.uid, "transactions");
      const q = query(transRef, orderBy("date", "desc"));
      const transSnap = await getDocs(q);
      const historyDiv = document.getElementById('transactionHistory');
      if (transSnap.empty) {
        historyDiv.innerHTML = '<p style="text-align:center; padding:2rem;">No transactions yet</p>';
      } else {
        let html = '';
        transSnap.forEach(doc => {
          const t = doc.data();
          const date = t.date?.toDate() || new Date();
          html += `<div class="transaction-item">
            <div><strong>${t.type === 'deposit' ? '💰 Deposit' : t.type === 'investment' ? '📈 Investment' : '💸 Withdrawal'}</strong><br><small>${date.toLocaleDateString()}</small></div>
            <div><strong style="color: ${t.type === 'withdrawal' ? '#ef4444' : '#10b981'}">${t.type === 'withdrawal' ? '-' : '+'} ${formatCurrency(t.amount)}</strong></div>
          </div>`;
        });
        historyDiv.innerHTML = html;
      }
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await loadDashboard(user);
      document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'index.html'; };
      document.getElementById('depositBtn').onclick = () => alert('Deposit feature coming soon!');
      document.getElementById('withdrawBtn').onclick = () => alert('Withdrawal feature coming soon!');
      document.getElementById('investBtn').onclick = () => alert('Investment feature coming soon!');
      document.getElementById('copyCodeBtn').onclick = () => {
        const code = document.getElementById('referralCode').innerHTML;
        navigator.clipboard.writeText(code);
        alert('Referral code copied!');
      };
    } else {
      window.location.href = 'login.html';
    }
  });
</script>
</body>
</html>
