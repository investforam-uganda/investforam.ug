<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - Foram Invest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .failed-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .failed-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .btn-primary {
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #1f3b4c;
            color: #1f3b4c;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="failed-card">
        <div class="failed-icon">❌</div>
        <h1>Payment Failed</h1>
        <p>We couldn't process your payment. Please try again or contact support.</p>
        <div class="btn-group">
            <a href="dashboard.html" class="btn-primary">Try Again</a>
            <a href="support.html" class="btn-outline">Contact Support</a>
        </div>
    </div>
</body>
</html>
