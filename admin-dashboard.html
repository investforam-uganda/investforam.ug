<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Foram Invest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background: #1e293b;
            color: white;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.3s;
            z-index: 100;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.7);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content {
            padding: 1rem;
            margin-left: 0;
        }
        .admin-header {
            background: white;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .menu-btn {
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .stat-number { font-size: 1.2rem; font-weight: 700; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .btn-primary, .btn-danger, .btn-sm {
            padding: 0.3rem 0.6rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-primary { background: #1f3b4c; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-box { margin-bottom: 0.8rem; }
        .search-box input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 0.5rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 0.5rem;
        }
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); }
            .main-content { margin-left: 250px; }
            .menu-btn { display: none; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>⚡ FORAM ADMIN</h2>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-tab="overview">📊 Overview</div>
            <div class="nav-item" data-tab="users">👥 Manage Users</div>
            <div class="nav-item" data-tab="homepage">🏠 Edit Homepage</div>
            <div class="nav-item" data-tab="system">⚙️ System Settings</div>
            <div class="nav-item" data-tab="transactions">💸 Transactions</div>
        </div>
    </div>

    <div class="main-content">
        <div class="admin-header">
            <button class="menu-btn" id="menuBtn">☰</button>
            <h1 id="pageTitle">Dashboard Overview</h1>
            <button class="btn-danger" id="logoutBtn">Logout</button>
        </div>

        <div id="overviewTab" class="tab-content active">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><h2>Recent Users</h2><div id="recentUsersList"></div></div>
        </div>

        <div id="usersTab" class="tab-content">
            <div class="card"><h2>All Users</h2><div class="search-box"><input type="text" id="searchUsers" placeholder="Search..."></div><div id="usersList"></div><button class="btn-primary" id="addUserBtn" style="margin-top:0.5rem;">+ Add User</button></div>
        </div>

        <div id="homepageTab" class="tab-content">
            <div class="card"><h2>Homepage Statistics</h2><form id="homepageForm"><div class="form-group"><label>Total Invested (UGX)</label><input type="number" id="totalInvestedHomepage"></div><div class="form-group"><label>Active Investors</label><input type="number" id="activeInvestorsHomepage"></div><div class="form-group"><label>Support Hours</label><input type="text" id="supportHoursHomepage"></div><div class="form-group"><label>Satisfaction Rate (%)</label><input type="number" id="satisfactionRateHomepage"></div><div id="homepageMsg"></div><button type="submit" class="btn-primary">Save</button></form></div>
        </div>

        <div id="systemTab" class="tab-content">
            <div class="card"><h2>System Settings</h2><form id="systemForm"><div class="form-group"><label>Admin Username</label><input type="text" id="adminUsername" value="srezra"></div><div class="form-group"><label>New Password</label><input type="password" id="adminPassword"></div><div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword"></div><div class="form-group"><label>Referral Bonus (UGX)</label><input type="number" id="referralBonus"></div><div class="form-group"><label>Min Deposit (UGX)</label><input type="number" id="minDeposit"></div><div id="systemMsg"></div><button type="submit" class="btn-primary">Save</button></form></div>
            <div class="card"><h2>Company Info</h2><form id="companyForm"><div class="form-group"><label>Company Name</label><input type="text" id="companyName"></div><div class="form-group"><label>Email</label><input type="email" id="companyEmail"></div><div class="form-group"><label>Phone</label><input type="text" id="companyPhone"></div><div class="form-group"><label>Address</label><textarea id="companyAddress" rows="2"></textarea></div><div id="companyMsg"></div><button type="submit" class="btn-primary">Save</button></form></div>
        </div>

        <div id="transactionsTab" class="tab-content">
            <div class="card"><h2>All Transactions</h2><div id="transactionsList"></div></div>
        </div>
    </div>

    <div id="editUserModal" class="modal">
        <div class="modal-content"><div class="modal-header"><h3>Edit User</h3><span class="close-modal" onclick="closeEditModal()">&times;</span></div>
        <form id="editUserForm"><input type="hidden" id="editUserId"><div class="form-group"><label>Full Name</label><input type="text" id="editFullName"></div><div class="form-group"><label>Email</label><input type="email" id="editEmail"></div><div class="form-group"><label>Phone</label><input type="text" id="editPhone"></div><div class="form-group"><label>Balance (UGX)</label><input type="number" id="editBalance"></div><div class="form-group"><label>Invested (UGX)</label><input type="number" id="editInvested"></div><div class="form-group"><label>Returns (UGX)</label><input type="number" id="editReturns"></div><div class="form-group"><label>Plan</label><select id="editPlan"><option>None</option><option>Basic Plan</option><option>Growth Plan</option><option>Premium Plan</option></select></div><div id="editUserMsg"></div><button type="submit" class="btn-primary">Save</button><button type="button" class="btn-danger" id="deleteUserBtn" style="margin-top:0.5rem;">Delete User</button></form></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX-ag3dli4j1DyP4nJKiO58yOEyQy-_5c",
            authDomain: "invest-foram-platform.firebaseapp.com",
            projectId: "invest-foram-platform",
            storageBucket: "invest-foram-platform.firebasestorage.app",
            messagingSenderId: "284475751069",
            appId: "1:284475751069:web:008f29e8696f483c19b274"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if (sessionStorage.getItem('adminLoggedIn') !== 'true') window.location.href = 'admin-login.html';

        let allUsers = [];

        function showMsg(el, msg, type) {
            const div = document.getElementById(el);
            div.innerHTML = `<div class="${type === 'success' ? 'success-message' : 'error-message'}" style="background:${type === 'success' ? '#dcfce7' : '#fee2e2'}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }

        // Tab switching
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.getAttribute('data-tab');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`${tab}Tab`).classList.add('active');
                if (tab === 'users') loadUsers();
                if (tab === 'transactions') loadTransactions();
                if (tab === 'overview') loadStats();
                if (tab === 'homepage') loadHomepage();
                if (tab === 'system') loadSystem();
            });
        });

        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');

        async function loadStats() {
            const users = await getDocs(collection(db, "users"));
            const userList = users.docs.map(d => d.data());
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div>👥</div><div><h3>Total Users</h3><div class="stat-number">${userList.length}</div></div></div>
                <div class="stat-card"><div>💰</div><div><h3>Total Balance</h3><div class="stat-number">UGX ${userList.reduce((s,u)=>s+(u.totalBalance||0),0).toLocaleString()}</div></div></div>
                <div class="stat-card"><div>📈</div><div><h3>Total Invested</h3><div class="stat-number">UGX ${userList.reduce((s,u)=>s+(u.totalInvested||0),0).toLocaleString()}</div></div></div>
                <div class="stat-card"><div>⭐</div><div><h3>Active Users</h3><div class="stat-number">${userList.filter(u=>(u.totalBalance||0)>0).length}</div></div></div>
            `;
            const recent = userList.slice(0,5);
            document.getElementById('recentUsersList').innerHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Balance</th></tr></thead><tbody>${recent.map(u=>`<tr><td>${u.fullName||'N/A'}</td><td>${u.email}</td><td>UGX ${(u.totalBalance||0).toLocaleString()}</td></tr>`).join('')}</tbody></table>`;
        }

        async function loadUsers() {
            const users = await getDocs(collection(db, "users"));
            allUsers = users.docs.map(d => ({ id: d.id, ...d.data() }));
            displayUsers(allUsers);
        }

        function displayUsers(users) {
            const search = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const filtered = users.filter(u => (u.fullName||'').toLowerCase().includes(search) || (u.email||'').toLowerCase().includes(search));
            document.getElementById('usersList').innerHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Balance</th><th>Plan</th><th></th></tr></thead><tbody>${filtered.map(u=>`<tr><td>${u.fullName||'N/A'}</td><td>${u.email}</td><td>UGX ${(u.totalBalance||0).toLocaleString()}</td><td>${u.activePlan||'None'}</td><td><button class="btn-primary btn-sm" onclick="editUser('${u.id}')">Edit</button></td></tr>`).join('')}</tbody></table>`;
        }

        window.editUser = (id) => {
            const user = allUsers.find(u => u.id === id);
            if (user) {
                document.getElementById('editUserId').value = id;
                document.getElementById('editFullName').value = user.fullName || '';
                document.getElementById('editEmail').value = user.email || '';
                document.getElementById('editPhone').value = user.phone || '';
                document.getElementById('editBalance').value = user.totalBalance || 0;
                document.getElementById('editInvested').value = user.totalInvested || 0;
                document.getElementById('editReturns').value = user.totalReturns || 0;
                document.getElementById('editPlan').value = user.activePlan || 'None';
                document.getElementById('editUserModal').classList.add('active');
            }
        };
        window.closeEditModal = () => document.getElementById('editUserModal').classList.remove('active');

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            await updateDoc(doc(db, "users", id), {
                fullName: document.getElementById('editFullName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                totalBalance: parseInt(document.getElementById('editBalance').value) || 0,
                totalInvested: parseInt(document.getElementById('editInvested').value) || 0,
                totalReturns: parseInt(document.getElementById('editReturns').value) || 0,
                activePlan: document.getElementById('editPlan').value
            });
            showMsg('editUserMsg', 'User updated!', 'success');
            setTimeout(() => { closeEditModal(); loadUsers(); loadStats(); }, 1000);
        });

        document.getElementById('deleteUserBtn').addEventListener('click', async () => {
            if (confirm('Delete user?')) {
                const id = document.getElementById('editUserId').value;
                await deleteDoc(doc(db, "users", id));
                showMsg('editUserMsg', 'User deleted!', 'success');
                setTimeout(() => { closeEditModal(); loadUsers(); loadStats(); }, 1000);
            }
        });

        document.getElementById('addUserBtn').onclick = () => alert('Use signup page to add users');

        async function loadTransactions() {
            const users = await getDocs(collection(db, "users"));
            let all = [];
            for (const u of users.docs) {
                const trans = await getDocs(collection(db, "users", u.id, "transactions"));
                trans.forEach(t => all.push({ ...t.data(), userName: u.data().fullName || u.data().email }));
            }
            all.sort((a,b) => (b.date?.toDate?.()||0) - (a.date?.toDate?.()||0));
            document.getElementById('transactionsList').innerHTML = `<table><thead><tr><th>Date</th><th>User</th><th>Type</th><th>Amount</th></tr></thead><tbody>${all.slice(0,30).map(t=>`<tr><td>${t.date?.toDate?.()?.toLocaleString()||'N/A'}</td><td>${t.userName}</td><td>${t.type||'N/A'}</td><td>UGX ${(t.amount||0).toLocaleString()}</td></tr>`).join('')}</tbody></table>`;
        }

        async function loadHomepage() {
            const snap = await getDoc(doc(db, "settings", "homepage"));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('totalInvestedHomepage').value = d.totalInvested || '';
                document.getElementById('activeInvestorsHomepage').value = d.activeInvestors || '';
                document.getElementById('supportHoursHomepage').value = d.supportHours || '';
                document.getElementById('satisfactionRateHomepage').value = d.satisfactionRate || '';
            }
        }

        document.getElementById('homepageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await setDoc(doc(db, "settings", "homepage"), {
                totalInvested: parseInt(document.getElementById('totalInvestedHomepage').value) || 0,
                activeInvestors: parseInt(document.getElementById('activeInvestorsHomepage').value) || 0,
                supportHours: document.getElementById('supportHoursHomepage').value,
                satisfactionRate: parseInt(document.getElementById('satisfactionRateHomepage').value) || 98
            });
            showMsg('homepageMsg', 'Homepage updated!', 'success');
        });

        async function loadSystem() {
            const snap = await getDoc(doc(db, "settings", "system"));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('referralBonus').value = d.referralBonus || 5000;
                document.getElementById('minDeposit').value = d.minDeposit || 300000;
            }
            const company = await getDoc(doc(db, "settings", "company"));
            if (company.exists()) {
                const c = company.data();
                document.getElementById('companyName').value = c.companyName || '';
                document.getElementById('companyEmail').value = c.companyEmail || '';
                document.getElementById('companyPhone').value = c.companyPhone || '';
                document.getElementById('companyAddress').value = c.companyAddress || '';
            }
        }

        document.getElementById('systemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('adminPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (newPass && newPass !== confirm) { showMsg('systemMsg', 'Passwords do not match!', 'error'); return; }
            if (newPass) sessionStorage.setItem('adminPassword', newPass);
            await setDoc(doc(db, "settings", "system"), {
                referralBonus: parseInt(document.getElementById('referralBonus').value) || 5000,
                minDeposit: parseInt(document.getElementById('minDeposit').value) || 300000
            });
            showMsg('systemMsg', 'Settings saved!', 'success');
            document.getElementById('adminPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        });

        document.getElementById('companyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await setDoc(doc(db, "settings", "company"), {
                companyName: document.getElementById('companyName').value,
                companyEmail: document.getElementById('companyEmail').value,
                companyPhone: document.getElementById('companyPhone').value,
                companyAddress: document.getElementById('companyAddress').value
            });
            showMsg('companyMsg', 'Company info saved!', 'success');
        });

        document.getElementById('searchUsers').addEventListener('input', (e) => {
            displayUsers(allUsers.filter(u => (u.fullName||'').toLowerCase().includes(e.target.value.toLowerCase()) || (u.email||'').toLowerCase().includes(e.target.value.toLowerCase())));
        });

        document.getElementById('logoutBtn').onclick = () => {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        };

        loadStats(); loadUsers(); loadHomepage(); loadSystem();
    </script>
</body>
</html>
