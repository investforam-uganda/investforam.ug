<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Foram Invest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c4a 0%, #2c5f8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }
        .btn-primary {
            background: #1f3b4c;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.6rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
        }
        .admin-dots {
            position: fixed;
            bottom: 15px;
            right: 15px;
            cursor: pointer;
            padding: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .admin-dots:hover { opacity: 0.3; }
        .dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <div class="admin-dots" id="adminDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h2>⚡ Admin Login</h2>
            <p>Enter admin credentials</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="srezra">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••">
            </div>
            <button type="submit" class="btn-primary">Login</button>
            <div id="errorMsg" class="error-message" style="display:none;"></div>
        </form>
    </div>

    <script>
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        let clickCount = 0;
        let clickTimer;
        document.getElementById('adminDots').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 1) clickTimer = setTimeout(() => clickCount = 0, 1000);
            if (clickCount === 3) {
                alert('Admin Access: Username: srezra, Password: 2023');
                clickCount = 0;
                clearTimeout(clickTimer);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'srezra' && password === '2023') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = 'Invalid credentials. Use: srezra / 2023';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
